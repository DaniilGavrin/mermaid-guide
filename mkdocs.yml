site_name: Mermaid Guide
site_description: Полное руководство по диаграммам Mermaid для документации
site_author: DaniilGavrin
repo_url: https://github.com/DaniilGavrin/mermaid-guide
repo_name: DaniilGavrin/mermaid-guide

theme:
  name: material
  language: ru
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - mermaid2
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - footnotes
  - tables

plugins:
  - search
  - mermaid2:
      version: 10.6.1
  - git-revision-date-localized:
      enable_creation_date: true

nav:
  - Главная: index.md
  - Основы:
    - Что такое Mermaid: basics/what-is-mermaid.md
    - Установка и настройка: basics/setup.md
    - Синтаксис: basics/syntax.md
  - Типы диаграмм:
    - Блок-схемы (Flowchart): diagrams/flowchart.md
    - Диаграммы последовательностей: diagrams/sequence.md
    - Диаграммы классов: diagrams/class.md
    - Диаграммы состояний: diagrams/state.md
    - Диаграммы сущность-связь: diagrams/er.md
    - Диаграммы Ганта: diagrams/gantt.md
    - Диаграммы зависимостей: diagrams/user-journey.md
    - Ментальные карты: diagrams/mindmap.md
    - Диаграммы таймлайн: diagrams/timeline.md
    - Диаграммы Зиккерта: diagrams/zenuml.md
    - Квадранты: diagrams/quadrant-chart.md
    - Диаграммы требований: diagrams/requirement.md
    - Диаграммы C4: diagrams/c4.md
  - Продвинутые техники:
    - Стилизация и темы: advanced/styling.md
    - Интерактивность: advanced/interactivity.md
    - Интеграция с другими инструментами: advanced/integration.md
  - Примеры использования:
    - Документация проектов: examples/documentation.md
    - Архитектурные схемы: examples/architecture.md
    - Алгоритмы: examples/algorithms.md
    - Бизнес-процессы: examples/business-processes.md
